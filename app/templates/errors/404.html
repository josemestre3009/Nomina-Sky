{% extends "base.html" %}
{% block title %}404 — Página no encontrada{% endblock %}
{% block body_class %}public-page{% endblock %}

{% block public_content %}
<div class="public-container">
    <div class="report-card text-center">
        <div class="report-card-body py-5">
            <div class="error-icon mb-3">
                <i class="bi bi-exclamation-triangle-fill text-warning" style="font-size: 4rem;"></i>
            </div>
            <h2>404</h2>
            <p class="text-muted mb-4">La página que buscas no existe.</p>
            <a href="{{ url_for('public.reporte') }}" class="btn btn-primary">
                <i class="bi bi-house-fill"></i> Ir al Inicio
            </a>
        </div>
    </div>
</div>
{% endblock %}
