{% extends "base.html" %}
{% block title %}403 — Acceso denegado{% endblock %}
{% block body_class %}public-page{% endblock %}

{% block public_content %}
<div class="public-container">
    <div class="report-card text-center">
        <div class="report-card-body py-5">
            <div class="error-icon mb-3">
                <i class="bi bi-shield-x text-danger" style="font-size: 4rem;"></i>
            </div>
            <h2>403</h2>
            <p class="text-muted mb-4">No tiene permisos para acceder a esta página.</p>
            <a href="{{ url_for('public.reporte') }}" class="btn btn-primary">
                <i class="bi bi-house-fill"></i> Ir al Inicio
            </a>
        </div>
    </div>
</div>
{% endblock %}
